title: "Portfolio — BENREBAI Bouchra"
description: "Portfolio professionnel de BENREBAI Bouchra — Développeur Web."
author: "BENREBAI Bouchra"
email: "benrebai.bouchra@gmail.com"
url: "https://Devlops693.github.io"
baseurl: "/portfolio_jekyll2"
lang: fr

theme: minima
minima:
  skin: classic

# --- Plugins SEO / accessibilité ---
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# --- Menu de navigation (minima lit cette liste) ---
header_pages:
  - about.md
  - projects.md
  - contact.md

# --- Collection "projets" (un fichier .md = un projet) ---
collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor